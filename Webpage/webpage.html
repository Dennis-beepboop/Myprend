<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurt Raymund H. Jara| Professional Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f7ff;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --primary-blue: #3498db;
            --hover-blue: #5dade2;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #e1f0fa;
            --shadow: 0 4px 15px rgba(52, 152, 219, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--nav-bg);
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1000;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        nav a {
            margin: 0 20px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.3s ease, transform 0.2s ease;
            display: inline-block;
        }

        nav a:hover {
            color: var(--primary-blue);
            transform: translateY(-2px);
        }

        /* --- Main Layout --- */
        .container {
            max-width: 900px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }

        section {
            background: var(--card-bg);
            padding: 50px;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: slideInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--primary-blue);
            margin-top: 8px;
            border-radius: 2px;
        }

        /* --- About Section --- */
        .profile-wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .about-text h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .about-text .title {
            color: var(--primary-blue);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- Social Links --- */
        .social-links {
            margin-top: 15px;
        }

        .fb-button {
            display: inline-block;
            background-color: #1877F2;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .fb-button:hover {
            opacity: 0.9;
        }

        /* --- Table --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 18px;
        }

        thead { background-color: #eaf6ff; }
        th { color: var(--primary-blue); text-transform: uppercase; font-size: 0.85rem; }
        tbody tr { border-bottom: 1px solid var(--border-color); }
        tbody tr:hover { background-color: #f4faff; }

        /* --- Form --- */
        .contact-form { display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        input, textarea {
            padding: 15px;
            border: 1px solid #d0e3f0;
            border-radius: 8px;
            font-family: inherit;
            background-color: #fbfdff;
        }

        button {
            padding: 15px 25px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        button:hover { background-color: var(--hover-blue); transform: translateY(-2px); }

        @media (max-width: 768px) {
            .profile-wrapper { flex-direction: column; text-align: center; }
            .container { margin-top: 100px; }
        }
    </style>
</head>

</body>
</html>
